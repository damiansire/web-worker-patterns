<div class="takeaways-box">
  <h3 class="takeaways-title">✓ {{ title() }}</h3>
  <ul class="takeaways-list">
    @for (item of items(); track item) {
      <li>{{ item }}</li>
    }
  </ul>
  @if (tip(); as tipText) {
    <div class="takeaways-tip">
      <span class="tip-label">💡 Tip:</span> {{ tipText }}
    </div>
  }
  @if (usedBy(); as usedByData) {
    <div class="takeaways-used-by">
      <h4 class="used-by-title">{{ usedByData.title }}</h4>
      <ul class="used-by-list">
        @for (project of usedByData.items; track project) {
          <li>{{ project }}</li>
        }
      </ul>
    </div>
  }
</div>
