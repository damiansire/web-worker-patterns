services:
  web-worker-patterns:
    build: .
    container_name: web-worker-patterns
    ports:
      - "9000:80"
    # No volume: the image serves the built app from the multi-stage build.
    # Rebuild after code changes: docker-compose up -d --build
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s


