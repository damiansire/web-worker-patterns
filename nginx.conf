server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Aislamiento cross-origin: requisito para SharedArrayBuffer / Atomics (demo 12).
    # Sin estas dos, crossOriginIsolated === false y la demo cae al backend simulado.
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Embedder-Policy require-corp always;

    # Hardening de base.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    # CSP restrictiva. worker-src incluye blob: porque Angular instancia los workers
    # vía blob URLs; 'unsafe-inline' en style-src por los estilos inyectados de Angular.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # OJO nginx: si un location define su propio add_header, REEMPLAZA los del server
    # (no los hereda). Re-declaramos COOP/COEP acá para que los .js/.css (donde viven
    # los workers) sigan cross-origin-isolated; sin esto, el SAB rompe sólo en este path.
    location ~* \.(js|css)$ {
        add_header Cross-Origin-Opener-Policy same-origin always;
        add_header Cross-Origin-Embedder-Policy require-corp always;
        add_header X-Content-Type-Options nosniff always;
        add_header Cache-Control "public, max-age=3600";
    }
}
